<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <clipPath id="circle">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>
  <!-- Body -->
  <ellipse cx="200" cy="310" rx="90" ry="70" fill="rgba(255,255,255,0.15)"/>
  <!-- Head -->
  <circle cx="200" cy="155" r="70" fill="rgba(255,255,255,0.9)"/>
  <!-- Face details -->
  <circle cx="178" cy="148" r="8" fill="#6366f1"/>
  <circle cx="222" cy="148" r="8" fill="#6366f1"/>
  <path d="M 178 175 Q 200 192 222 175" stroke="#6366f1" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Collar/shirt -->
  <path d="M 130 320 Q 160 260 200 255 Q 240 260 270 320 Z" fill="rgba(255,255,255,0.25)" clip-path="url(#circle)"/>
  <!-- Initials fallback text -->
  <text x="200" y="390" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.5)" text-anchor="middle">Photo</text>
</svg>

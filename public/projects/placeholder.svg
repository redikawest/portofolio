<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="rgba(99,102,241,0.08)" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>
  <!-- Browser chrome mockup -->
  <rect x="80" y="60" width="640" height="380" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <!-- Titlebar -->
  <rect x="80" y="60" width="640" height="36" rx="12" fill="rgba(255,255,255,0.06)"/>
  <rect x="80" y="84" width="640" height="12" fill="rgba(255,255,255,0.06)"/>
  <!-- Traffic lights -->
  <circle cx="104" cy="78" r="5" fill="#ff5f57" opacity="0.7"/>
  <circle cx="120" cy="78" r="5" fill="#febc2e" opacity="0.7"/>
  <circle cx="136" cy="78" r="5" fill="#28c840" opacity="0.7"/>
  <!-- URL bar -->
  <rect x="160" y="69" width="380" height="18" rx="4" fill="rgba(255,255,255,0.06)"/>
  <!-- Content area blocks -->
  <rect x="104" y="116" width="592" height="24" rx="4" fill="rgba(99,102,241,0.15)"/>
  <rect x="104" y="156" width="280" height="140" rx="8" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  <rect x="404" y="156" width="292" height="64" rx="4" fill="rgba(255,255,255,0.04)"/>
  <rect x="404" y="232" width="200" height="12" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="404" y="252" width="240" height="12" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="404" y="272" width="180" height="12" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="104" y="316" width="592" height="12" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="104" y="336" width="480" height="12" rx="3" fill="rgba(255,255,255,0.03)"/>
  <rect x="104" y="356" width="520" height="12" rx="3" fill="rgba(255,255,255,0.03)"/>
  <!-- Accent bar -->
  <rect x="80" y="60" width="640" height="3" rx="2" fill="url(#accent)" opacity="0.6"/>
  <!-- Center icon -->
  <circle cx="244" cy="226" r="24" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="244" y="233" font-family="monospace" font-size="20" fill="rgba(99,102,241,0.7)" text-anchor="middle">⚡</text>
  <!-- Label -->
  <text x="400" y="476" font-family="system-ui, sans-serif" font-size="12" fill="rgba(99,102,241,0.4)" text-anchor="middle" letter-spacing="3">PROJECT SCREENSHOT</text>
</svg>
